@if (note) {
<div id="note-container">
  <span class="note-title">{{ note.title }}</span>
  <span class="note-id">ID: {{ note.id }}</span>
  <span class="note-text">Text: {{ note.text }}</span>
  <span class="note-delete">
    <button id="delete-button" (click)="deleteNote()">Delete</button>
  </span>
</div>
}
<nav>
  <button routerLink="">Back to List</button>
</nav>
